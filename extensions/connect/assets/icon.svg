<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338CA"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (same as Recurate family) -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Two arrows on top of each other in opposite directions -->
  <!-- Top arrow: pointing right -->
  <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="30" y1="48" x2="88" y2="48"/>
    <polyline points="76,36 88,48 76,60"/>
  </g>

  <!-- Bottom arrow: pointing left -->
  <g fill="none" stroke="#34D399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="40" y1="80" x2="98" y2="80"/>
    <polyline points="52,68 40,80 52,92"/>
  </g>
</svg>
